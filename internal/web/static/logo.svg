<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 258 186" role="img" aria-label="cinatlas projector logo">
  <!-- Rear reel. -->
  <circle cx="72" cy="62" r="26" fill="#0d0e12" stroke="#e8b13c" stroke-width="6"/>
  <circle cx="72" cy="62" r="7" fill="#e8b13c"/>

  <!-- Front reel with the earth sticker. -->
  <circle cx="160" cy="54" r="44" fill="#0d0e12" stroke="#e8b13c" stroke-width="6"/>
  <clipPath id="sticker"><circle cx="160" cy="54" r="34"/></clipPath>
  <circle cx="160" cy="54" r="34" fill="#12141a"/>
  <g clip-path="url(#sticker)">
    <!-- Americas. -->
    <path d="M134 28c10-6 20-4 23 2 2 5-3 9-9 10-4 1-5 4-4 8 1 3-2 5-5 4-5-2-9-7-10-13-1-5 1-9 5-11z" fill="#e8b13c"/>
    <path d="M144 56c5-1 9 2 10 7 1 6-2 14-7 17-4 2-7-2-7-7 0-6 0-14 4-17z" fill="#e8b13c"/>
    <!-- Europe and Africa. -->
    <path d="M170 28c6-3 13-2 16 2 2 3 0 6-3 7 3 2 6 5 6 10 1 8-4 17-11 19-6 2-11-2-12-8-1-5-2-9 0-14 1-5 1-13 4-16z" fill="#e07b39"/>
    <!-- Australia. -->
    <ellipse cx="186" cy="78" rx="7" ry="5" fill="#e8b13c"/>
  </g>
  <circle cx="160" cy="54" r="34" fill="none" stroke="#e07b39" stroke-width="3"/>

  <!-- Body. -->
  <rect x="46" y="100" width="152" height="46" rx="12" fill="#0b0c0f" stroke="#26282e" stroke-width="2"/>
  <circle cx="66" cy="123" r="5" fill="#e07b39"/>
  <rect x="80" y="119" width="32" height="5" rx="2.5" fill="#e8b13c" opacity="0.7"/>

  <!-- Lens. -->
  <rect x="192" y="110" width="22" height="26" rx="6" fill="#0b0c0f" stroke="#26282e" stroke-width="2"/>
  <circle cx="221" cy="123" r="11" fill="#12141a" stroke="#e8b13c" stroke-width="5"/>
  <circle cx="221" cy="123" r="3.5" fill="#e07b39"/>

  <!-- Projection beam. -->
  <polygon points="233,117 258,105 258,141 233,129" fill="#f3c95c" opacity="0.30"/>
  <polygon points="233,120 258,112 258,134 233,126" fill="#e8b13c" opacity="0.55"/>

  <!-- Feet. -->
  <rect x="62" y="146" width="26" height="8" rx="4" fill="#1a1c21"/>
  <rect x="152" y="146" width="26" height="8" rx="4" fill="#1a1c21"/>
</svg>
